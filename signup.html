{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-sm mt-5 border-0">
            <h3 class="mb-4 fw-bold text-center text-danger">Create an Account</h3>
            <form action="/signup" method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Full Name</label>
                    <input type="text" name="full_name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold">Pincode</label>
                    <input type="text" name="pincode" class="form-control" placeholder="e.g. 110001" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Sign Up</button>
            </form>
            <div class="text-center mt-4">
                <small class="text-muted">Already have an account? <a href="/login" class="text-danger fw-bold text-decoration-none">Log in here</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
